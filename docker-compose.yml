services:
  ctfd:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
      - .:/opt/CTFd:ro
    depends_on:
      permissions:
        condition: service_completed_successfully
      db:
        condition: service_started
      cache:
        condition: service_started
    networks:
        default:
        internal:

  # TODO: CTFd 4.0 Migrate to named volumes. Users will likely need to manually migrate existing files
  permissions:
    image: alpine:3.23
    user: root
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
    command: chown -R 1001:1001 /var/uploads /var/log/CTFd

  nginx:
    image: nginx:stable
    restart: always
    volumes:
      - ./conf/nginx/prod.conf:/etc/nginx/nginx.conf
      - server_ssl:/var/cache/nginx/ssl/
    ports:
      - 80:80
      - 443:443
    depends_on:
      - ctfd

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=ctfd
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=ctfd
      - MARIADB_DATABASE=ctfd
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - .data/mysql:/var/lib/mysql
    networks:
        internal:
    # This command is required to set important mariadb defaults
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --wait_timeout=28800, --log-warnings=0]

# docker compose for challenges

  pwnme:
    container_name: pwnme
    build:
      context: ./pwnme
    restart: always
    ports:
      - 9000:9000
    networks:
      - default

  pwnme-2:
    container_name: pwnme-2
    build:
      context: ./pwnme-2
    restart: always
    ports:
      - 9001:9000
    networks:
      - default


  web-challenge-1:
    container_name: web-challenge-1
    init: true
    build:
      context: ./web-challenge-1/
      dockerfile: ./Dockerfile
    restart: always

  web-challenge-2:
    container_name: web-challenge-2
    init: true
    build:
      context: ./web-challenge-2/
      dockerfile: ./Dockerfile
    restart: always


  web-challenge-3:
    container_name: web-challenge-3
    init: true
    build:
      context: ./web-challenge-3/
      dockerfile: ./Dockerfile
    restart: always

  cache:
    image: redis:4
    restart: always
    volumes:
    - .data/redis:/data
    networks:
        internal:

networks:
    default:
    internal:
        internal: true

volumes:
  server_ssl: