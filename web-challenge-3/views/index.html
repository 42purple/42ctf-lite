<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Peer finder</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
        display: flex;
        align-items: center;
        flex-direction: column;
        color: white;
    }

    .title {
        width: 100%;
        background: linear-gradient(135deg, #09090b, #11112c);
        border-radius: 15px;
        backdrop-filter: blur(15px);
        border-top-left-radius: unset;
        border-top-right-radius: unset;
        margin-bottom: 150px;
        text-align: center;
        color: linear-gradient(90deg, #e600e6, #d4de07);
    }

    .container {
        width: 420px;
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        animation: fadeIn 0.6s ease;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .search-box {
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.15);
        color: white;
    }

    input::placeholder {
        color: rgba(255,255,255,0.6);
    }

    button {
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background: #6c63ff;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #5a52e0;
        transform: translateY(-1px);
    }

    .results {
        margin-top: 20px;
    }

    .card {
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 10px;
        background: rgba(255,255,255,0.1);
        transition: 0.2s;
    }

    .card:hover {
        transform: scale(1.02);
        background: rgba(255,255,255,0.15);
    }

    .email {
        font-size: 0.85em;
        opacity: 0.7;
    }

    .footer {
        text-align: center;
        margin-top: 15px;
    }

    a {
        color: #aab0ff;
        text-decoration: none;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="title">
    <h1> Peer finder </h1>
</div>

<div class="container">
    <h1>Search a student...</h1>

    <div class="search-box">
        <input id="query" placeholder="Search username...">
        <button onclick="search()">Search</button>
    </div>

    <div class="results" id="results"></div>
</div>

<script>
async function search() {
    const query = document.getElementById('query').value;

    const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'query=' + encodeURIComponent(query)
    });

    const data = await res.json();
    const container = document.getElementById('results');

    container.innerHTML = '';

    if ("error" in data) {
        container.innerHTML = "<p> " + data.error + "</p>";
        return;
    }
    if (data.length === 0) {
        container.innerHTML = "<p>No users found</p>";
        return;
    }

    data.forEach(user => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <strong>${user.username}</strong>
            <div class="email">${user.email}</div>
        `;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
